name: Terraform Plan

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.3

      - name: Setup GCP Credentials
        run: |
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > /tmp/account.json
        shell: bash

      - name: Override tfvars for GitHub Actions
        run: |
          echo 'credentials_file = ""' > environments/dev/terraform.override.tfvars

      - name: Terraform Init
        working-directory: environments/dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/account.json
        run: terraform init

      - name: Terraform Format Check
        working-directory: environments/dev
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: environments/dev
        run: terraform validate

      - name: Terraform Plan
        working-directory: environments/dev
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/account.json
        run: terraform plan -var-file="terraform.override.tfvars"
